<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dang nhap - Duhy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<main class="app-shell">
    <section class="card-lite p-4 mx-auto" style="max-width:480px;">
        <h1 class="h4 fw-bold mb-1">Duhy</h1>
        <p class="text-muted">Quan ly giai dau, doi bong va realtime livescore.</p>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label fw-semibold">Tai khoan / Email</label>
                <input class="form-control form-control-lg" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Mat khau</label>
                <input class="form-control form-control-lg" type="password" name="password" required>
            </div>
            <div class="mb-4">
                <div class="btn-group w-100">
                    <input class="btn-check" type="radio" name="role" value="ADMIN" id="roleAdmin" checked>
                    <label class="btn btn-outline-primary" for="roleAdmin">Admin</label>
                    <input class="btn-check" type="radio" name="role" value="PLAYER" id="rolePlayer">
                    <label class="btn btn-outline-primary" for="rolePlayer">VDV</label>
                </div>
            </div>
            <button class="btn btn-primary w-100 btn-lg" data-loading-text="Dang dang nhap...">Dang nhap</button>
        </form>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
