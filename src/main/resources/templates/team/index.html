<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Đội Bóng')}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <h1 class="h4 fw-bold mb-3">👥 Quản Lý Đội Bóng</h1>
    <section class="card-lite p-3 mb-3" th:if="${currentUser.admin()}">
        <form class="row g-2" method="post" action="/teams">
            <div class="col-md-5"><input class="form-control" name="name" placeholder="Tên đội" required></div>
            <div class="col-md-5"><input class="form-control" name="description" placeholder="Mô tả"></div>
            <div class="col-md-2"><button class="btn btn-success w-100 fw-bold" data-loading-text="...">➕ Tạo</button></div>
        </form>
    </section>
    <div class="row g-3">
        <div class="col-md-6" th:each="team : ${teams}">
            <a class="card-lite p-3 d-block text-decoration-none text-dark" th:href="@{/teams/{id}(id=${team.id})}">
                <div class="fw-bold text-primary h5" th:text="${team.name}"></div>
                <div class="text-muted small" th:text="${team.description}"></div>
            </a>
        </div>
    </div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
