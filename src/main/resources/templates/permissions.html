<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Phân Quyền')}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <h1 class="h4 fw-bold mb-3">⚙️ Phân Quyền Admin</h1>
    <section class="card-lite p-0">
        <div class="card-header bg-primary text-white fw-bold">Danh sách quyền theo tính năng</div>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-dark"><tr><th>Admin</th><th th:each="f : ${features}" th:text="${f.label()}"></th></tr></thead>
                <tbody>
                <tr th:each="row : ${rows}">
                    <td class="fw-bold" th:text="${row.admin.displayName + ' (' + row.admin.username + ')'}"></td>
                    <td th:each="f : ${features}">
                        <form method="post" action="/permissions">
                            <input type="hidden" name="adminId" th:value="${row.admin.id}">
                            <input type="hidden" name="feature" th:value="${f.name()}">
                            <input type="hidden" name="enabled" th:value="${!row.enabled.get(f)}">
                            <button class="btn btn-sm"
                                    th:classappend="${row.enabled.get(f)} ? 'btn-success' : 'btn-outline-secondary'"
                                    th:text="${row.enabled.get(f)} ? 'Có' : 'Không'"
                                    data-loading-text="..."></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
