<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head(${team.name})}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <h1 class="h4 fw-bold" th:text="${team.name}"></h1>
    <p class="text-muted">Module doi bong da duoc tach rieng. Vong sau se bo sung menu thanh vien, quy thang, dong phi va khoan chi.</p>
    <section class="card-lite p-3">
        <h2 class="section-title mb-2">Thanh vien</h2>
        <div class="text-muted" th:if="${members.isEmpty()}">Chua co thanh vien.</div>
        <ul class="mb-0" th:if="${!members.isEmpty()}">
            <li th:each="m : ${members}" th:text="${m.player.displayName}"></li>
        </ul>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
