<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Duhy')}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <h1 class="h3 fw-bold mb-3">Bang dieu khien</h1>
    <div class="action-grid">
        <a class="card-lite p-3 text-decoration-none text-dark" href="/tournaments"
           th:if="${featureSet.contains(T(com.duhy.auth.AppFeature).TOURNAMENTS)}">
            <div class="fw-bold">Giai dau</div>
            <div class="text-muted small">VDV, quy, lich, bang xep hang, dong phi.</div>
        </a>
        <a class="card-lite p-3 text-decoration-none text-dark" href="/teams"
           th:if="${featureSet.contains(T(com.duhy.auth.AppFeature).TEAMS)}">
            <div class="fw-bold">Doi bong</div>
            <div class="text-muted small">Thanh vien va quy thang.</div>
        </a>
        <a class="card-lite p-3 text-decoration-none text-dark" href="/travel"
           th:if="${featureSet.contains(T(com.duhy.auth.AppFeature).TRAVEL)}">
            <div class="fw-bold">Du lich</div>
            <div class="text-muted small">Module thu chi chuyen di se duoc dung lai sau giai dau.</div>
        </a>
        <a class="card-lite p-3 text-decoration-none text-dark" href="/players"
           th:if="${currentUser != null and currentUser.admin() and featureSet.contains(T(com.duhy.auth.AppFeature).TOURNAMENTS)}">
            <div class="fw-bold">Van dong vien</div>
            <div class="text-muted small">Danh sach VDV dung chung.</div>
        </a>
        <a class="card-lite p-3 text-decoration-none text-dark" href="/permissions"
           th:if="${featureSet.contains(T(com.duhy.auth.AppFeature).PERMISSIONS)}">
            <div class="fw-bold">Phan quyen</div>
            <div class="text-muted small">Cap quyen module cho admin phu.</div>
        </a>
    </div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
