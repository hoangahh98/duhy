<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Dang ky thanh cong')}"></head>
<body>
<main class="app-shell">
    <section class="card-lite p-3 mx-auto" style="max-width:560px;">
        <h1 class="h4 fw-bold">Dang ky thanh cong</h1>
        <p class="text-muted">Ban da duoc them vao giai. Tai khoan xem giai:</p>
        <div class="alert alert-light border">
            <div><strong>User:</strong> <span th:text="${registration.externalEmail}"></span></div>
            <div><strong>Mat khau:</strong> 123456789</div>
        </div>
        <a class="btn btn-primary w-100" th:href="@{/tournaments/{id}/players(id=${registration.tournament.id})}">Link xem giai</a>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
