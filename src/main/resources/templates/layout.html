<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Duhy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar topbar" th:fragment="topbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="/">Duhy</a>
        <div class="d-flex align-items-center gap-2">
            <span class="text-white-50 small" th:if="${currentUser}" th:text="${currentUser.displayName()}">Admin</span>
            <form method="post" action="/logout">
                <button class="btn btn-sm btn-outline-light" data-loading-text="...">Dang xuat</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
