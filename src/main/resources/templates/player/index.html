<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Van dong vien')}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0">Van dong vien</h1>
        <a class="btn btn-outline-secondary" href="/">Trang chu</a>
    </div>
    <section class="card-lite p-3 mb-3">
        <div class="alert alert-warning" th:if="${error != null and !error.isBlank()}" th:text="${error}"></div>
        <form class="row g-2" method="post" action="/players">
            <div class="col-md-3"><input class="form-control" name="displayName" placeholder="Ho ten" required></div>
            <div class="col-md-3"><input class="form-control" type="email" name="email" placeholder="Email" required></div>
            <div class="col-md-2">
                <select class="form-select" name="skillLevel">
                    <option>A</option><option>B</option><option selected>C</option><option>D</option>
                </select>
            </div>
            <div class="col-md-3"><input class="form-control" name="notes" placeholder="Ghi chu"></div>
            <div class="col-md-1"><button class="btn btn-primary w-100" data-loading-text="...">Them</button></div>
        </form>
    </section>
    <section class="card-lite p-0">
        <table class="table mb-0">
            <thead><tr><th>Ten</th><th>Email</th><th>Trinh</th></tr></thead>
            <tbody>
            <tr th:each="p : ${players}">
                <td th:text="${p.displayName}"></td>
                <td th:text="${p.email}"></td>
                <td><span class="badge text-bg-secondary" th:text="${p.skillLevel}"></span></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
