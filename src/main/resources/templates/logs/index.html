<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Monitor Log')}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <div class="card-lite p-3 mb-3">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div>
                <h1 class="h4 fw-bold mb-1">🧯 Monitor Log Hệ Thống</h1>
                <div class="text-muted small">Chỉ user admin gốc được xem màn hình này.</div>
            </div>
            <div class="btn-group">
                <a class="btn btn-sm" th:each="item : ${levels}"
                   th:classappend="${level == item} ? 'btn-primary' : 'btn-outline-primary'"
                   th:href="@{/logs(level=${item})}"
                   th:text="${item}"></a>
            </div>
        </div>
    </div>
    <section class="card-lite p-0">
        <div class="card-header bg-primary text-white fw-bold">200 log mới nhất</div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Thời gian</th>
                    <th>Mức</th>
                    <th>User</th>
                    <th>Thao tác</th>
                    <th>HTTP</th>
                    <th>Chi tiết</th>
                    <th>Lỗi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td class="small" th:text="${#temporals.format(log.createdAt, 'dd/MM HH:mm:ss')}"></td>
                    <td><span class="badge"
                              th:classappend="${log.level.name() == 'ERROR'} ? 'text-bg-danger' : (${log.level.name() == 'WARN'} ? 'text-bg-warning' : 'text-bg-secondary')"
                              th:text="${log.level}"></span></td>
                    <td class="small">
                        <div th:text="${log.username ?: 'anonymous'}"></div>
                        <div class="text-muted" th:text="${log.userRole ?: ''}"></div>
                    </td>
                    <td class="small">
                        <div class="fw-bold" th:text="${log.category}"></div>
                        <div th:text="${log.action}"></div>
                    </td>
                    <td class="small">
                        <div><span th:text="${log.method ?: ''}"></span> <span th:text="${log.path ?: ''}"></span></div>
                        <div class="text-muted">Status <span th:text="${log.statusCode ?: '-'}"></span> · <span th:text="${log.durationMs ?: '-'}"></span>ms</div>
                    </td>
                    <td class="small text-break" th:text="${log.details}"></td>
                    <td class="small text-danger text-break" th:text="${log.errorMessage}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
