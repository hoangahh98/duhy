<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Dang ky ngoai')}"></head>
<body>
<main class="app-shell">
    <section class="card-lite p-3 mx-auto" style="max-width:560px;">
        <h1 class="h4 fw-bold">Dang ky giai</h1>
        <p class="text-muted" th:text="${tournament.name}"></p>
        <form method="post">
            <div class="mb-3"><label class="form-label">Ho ten</label><input class="form-control" name="displayName" required></div>
            <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
            <div class="mb-3"><label class="form-label">Trinh do</label><select class="form-select" name="skillLevel"><option>A</option><option>B</option><option selected>C</option><option>D</option></select></div>
            <button class="btn btn-success w-100" data-loading-text="Dang dang ky...">Dang ky</button>
        </form>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
