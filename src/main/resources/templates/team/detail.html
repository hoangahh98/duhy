<!doctype html>
<html lang="vi">

<body>
<nav th:replace="~{layout :: topbar}"></nav>

    <section class="card-lite p-3">
        <h2 class="section-title mb-2">Thành viên</h2>
        <div class="text-muted" th:if="${members.isEmpty()}">Chưa có thành viên.</div>
    </section>
</main>
<script src="/js/app.js"></script>

</html>
